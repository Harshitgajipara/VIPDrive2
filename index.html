<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/images/Logo2.svg" />

    <!-- SEO -->
    <title>VIPDrive — Luxury Car Booking & Chauffeur Service</title>
    <meta
      name="description"
      content="VIPDrive offers premium luxury car booking and chauffeur services. Arrive in style for weddings, corporate events, airport transfers, and special organized trips."
    />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://vipdrive.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="VIPDrive — Luxury Car Booking & Chauffeur Service" />

      property="og:description"
      content="Premium luxury car booking and chauffeur services for weddings, corporate events, airport transfers, and special trips."
    />
    <meta property="og:url" content="https://vipdrive.com/" />
    <meta property="og:site_name" content="VIPDrive" />

    <meta name="twitter:card" content="summary_large_image" />

    <meta name="twitter:description" content="Premium luxury car booking and chauffeur services." />

    <!-- Google Fonts: Inter + Roboto -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Roboto:wght@300;400;500;700&display=swap"
    />

    <!-- Font Awesome (icons used in Footer) -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
